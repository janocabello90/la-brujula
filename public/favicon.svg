<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" stroke="#111111" stroke-width="3" fill="#faf7f2"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="24" stroke="#e5e0d8" stroke-width="1.5" fill="none"/>
  <!-- Cardinal ticks -->
  <line x1="32" y1="5" x2="32" y2="11" stroke="#111111" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="53" x2="32" y2="59" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
  <line x1="5" y1="32" x2="11" y2="32" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="32" x2="59" y2="32" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
  <!-- Needle: north (naranja) -->
  <polygon points="32,12 28,32 32,29 36,32" fill="#e8920a"/>
  <!-- Needle: south (dark) -->
  <polygon points="32,52 28,32 32,35 36,32" fill="#111111" opacity="0.3"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#111111"/>
  <circle cx="32" cy="32" r="1.5" fill="#e8920a"/>
</svg>
